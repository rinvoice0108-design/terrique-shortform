name: 테리크 숏폼 주간 발송

on:
  schedule:
    # KST 07:43 = UTC 22:43, 매일 실행 (발송일 판단은 스크립트 내부)
    - cron: '43 22 * * *'
  workflow_dispatch:
    inputs:
      force_send:
        description: '요일 무관 강제 발송 (테스트용)'
        type: boolean
        default: false

jobs:
  send:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Write Google service account credentials
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: echo "$GOOGLE_SERVICE_ACCOUNT_JSON" > service-account.json

      - name: Run weekly mailer
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_MODEL: ${{ secrets.CLAUDE_MODEL }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          GOOGLE_SHEETS_ID: ${{ secrets.GOOGLE_SHEETS_ID }}
          FORCE_SEND: ${{ inputs.force_send }}
        run: node scripts/weekly.js
